name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GROQ_API_KEY: test_key
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run backend tests with coverage
        run: |
          python -m pytest \
            --cov=backend \
            --cov=evaluation \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Run evaluation suite
        run: |
          python scripts/run_evaluation.py --mock --output evaluation/results.json

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-results
          path: evaluation/results.json

  live-evaluation:
    needs: backend-quality
    if: ${{ secrets.GROQ_API_KEY != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run live evaluation sanity suite
        run: |
          python scripts/run_evaluation.py \
            --scenario-ids \
            "eval://sec/sql-injection,eval://style/bare-except,eval://design/god-function,eval://adversarial/prompt-injection" \
            --output evaluation/live-results.json \
            --min-success-rate 100 \
            --min-avg-f1 0.35

      - name: Run live real-world evaluation
        run: |
          python scripts/run_evaluation.py \
            --real-world \
            --output evaluation/real-world-live-results.json \
            --delay 1.0 \
            --min-success-rate 100 \
            --min-avg-f1 0.20

      - name: Upload live evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-evaluation-results
          path: evaluation/live-results.json

      - name: Upload live real-world evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-real-world-evaluation-results
          path: evaluation/real-world-live-results.json
