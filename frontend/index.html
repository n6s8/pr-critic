<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Critic</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0d1117; color: #e6edf3; min-height: 100vh; }
  .header { background: #161b22; border-bottom: 1px solid #30363d;
            padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 20px; font-weight: 700; color: #58a6ff; }
  .badge { background: #1f6feb33; color: #58a6ff; font-size: 11px;
           padding: 2px 8px; border-radius: 12px; border: 1px solid #1f6feb; }
  .container { max-width: 960px; margin: 32px auto; padding: 0 24px; }
  .card { background: #161b22; border: 1px solid #30363d;
          border-radius: 8px; padding: 24px; margin-bottom: 20px; }
  label { font-size: 13px; color: #8b949e; display: block; margin-bottom: 6px; }
  .input-row { display: flex; gap: 8px; }
  input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
          color: #e6edf3; font-size: 14px; padding: 10px 12px; }
  input:focus { outline: none; border-color: #58a6ff; }
  button { background: #238636; color: #fff; border: none; border-radius: 6px;
           font-size: 14px; font-weight: 600; padding: 10px 20px; cursor: pointer;
           transition: background .15s; white-space: nowrap; }
  button:hover:not(:disabled) { background: #2ea043; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .quick-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e;
               border-radius: 4px; font-size: 12px; padding: 4px 10px; cursor: pointer; }
  .quick-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 13px;
            color: #8b949e; padding: 8px 0; }
  .spinner { width: 16px; height: 16px; border: 2px solid #30363d;
             border-top-color: #58a6ff; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
  .score-bar { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
  .score-num { font-size: 28px; font-weight: 700; min-width: 48px; }
  .score-track { flex: 1; background: #21262d; border-radius: 4px; height: 8px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 4px; transition: width .5s; }
  .tag { display: inline-block; font-size: 11px; font-weight: 600;
         padding: 2px 8px; border-radius: 4px; margin-right: 6px; }
  .tag-critical { background: #ff000022; color: #ff6b6b; border: 1px solid #ff000044; }
  .tag-major    { background: #ff990022; color: #ffaa44; border: 1px solid #ff990044; }
  .tag-minor    { background: #ffff0022; color: #ffee44; border: 1px solid #ffff0044; }
  .tag-approve  { background: #00880022; color: #3fb950; border: 1px solid #00880044; }
  .candidates { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
  .cand-card { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 16px; }
  .cand-card.best { border-color: #388bfd; }
  .cand-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #8b949e; }
  .review-text { white-space: pre-wrap; font-size: 13px; line-height: 1.6;
                 color: #c9d1d9; background: #0d1117; border-radius: 6px;
                 padding: 16px; border: 1px solid #21262d; max-height: 400px; overflow-y: auto; }
  .trace-item { font-size: 12px; font-family: monospace; color: #8b949e;
                padding: 4px 0; border-bottom: 1px solid #21262d; }
  .trace-item:last-child { border: none; }
  .trace-agent { color: #58a6ff; }
  .trace-event { color: #3fb950; }
  .trace-event.error { color: #ff6b6b; }
  h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #e6edf3; }
  .meta { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase;
                   letter-spacing: .06em; color: #58a6ff; margin-bottom: 8px; }
  .branched-badge { background: #6e40c922; color: #a371f7; border: 1px solid #6e40c955;
                    border-radius: 4px; font-size: 11px; padding: 2px 8px; margin-left: 8px; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">PR Critic</span>
  <span class="badge">Multi-Agent</span>
  <span class="badge">LangGraph</span>
</div>

<div class="container">
  <div class="card">
    <label>PR URL or mock key</label>
    <div class="input-row">
      <input id="pr-url" type="text" placeholder="mock://pr/security-issue"
             value="mock://pr/security-issue">
      <button id="run-btn" onclick="runReview()">Review PR</button>
    </div>
    <div class="quick-btns">
      <span style="font-size:12px;color:#8b949e;align-self:center">Quick load:</span>
      <button class="quick-btn" onclick="setUrl('mock://pr/security-issue')">security-issue</button>
      <button class="quick-btn" onclick="setUrl('mock://pr/clean-refactor')">clean-refactor</button>
      <button class="quick-btn" onclick="setUrl('mock://pr/style-only')">style-only</button>
      <button class="quick-btn" onclick="setUrl('mock://pr/empty')">empty</button>
    </div>
  </div>

  <div id="status" class="status hidden">
    <div class="spinner"></div>
    <span id="status-text">Running pipeline…</span>
  </div>

  <div id="error-box" class="card hidden" style="border-color:#ff6b6b">
    <span style="color:#ff6b6b" id="error-text"></span>
  </div>

  <div id="results" class="hidden">
    <!-- Header -->
    <div class="card">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px">
        <h2 id="pr-title" style="margin:0"></h2>
        <span id="branched-badge" class="branched-badge hidden">⚡ branched</span>
      </div>
      <div class="meta" id="pr-meta"></div>

      <div class="score-bar" style="margin-top:16px">
        <div id="score-num" class="score-num"></div>
        <div class="score-track">
          <div id="score-fill" class="score-fill"></div>
        </div>
        <div id="score-label" style="font-size:13px;color:#8b949e;min-width:60px"></div>
      </div>
      <div class="meta" id="selector-rationale"></div>
    </div>

    <!-- Best review -->
    <div class="card">
      <div class="section-label">Best Review</div>
      <div class="review-text" id="best-review"></div>
    </div>

    <!-- All candidates (shown when branching happened) -->
    <div id="candidates-section" class="card hidden">
      <div class="section-label">All Candidates</div>
      <div class="candidates" id="candidates-grid"></div>
    </div>

    <!-- Agent trace -->
    <div class="card">
      <div class="section-label" style="cursor:pointer" onclick="toggleTrace()">
        Agent Trace <span id="trace-toggle" style="color:#8b949e">▼ show</span>
      </div>
      <div id="trace-container" class="hidden" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;

function setUrl(url) {
  document.getElementById('pr-url').value = url;
}

function toggleTrace() {
  const c = document.getElementById('trace-container');
  const t = document.getElementById('trace-toggle');
  const hidden = c.classList.toggle('hidden');
  t.textContent = hidden ? '▼ show' : '▲ hide';
}

function scoreColor(s) {
  if (s >= 8) return '#3fb950';
  if (s >= 6) return '#d29922';
  return '#f85149';
}

function scoreLabel(s) {
  if (s >= 8) return 'Excellent';
  if (s >= 6) return 'Adequate';
  if (s >= 4) return 'Weak';
  return 'Poor';
}

async function runReview() {
  const url = document.getElementById('pr-url').value.trim();
  if (!url) return;

  document.getElementById('run-btn').disabled = true;
  document.getElementById('status').classList.remove('hidden');
  document.getElementById('status-text').textContent = 'Running pipeline…';
  document.getElementById('results').classList.add('hidden');
  document.getElementById('error-box').classList.add('hidden');

  try {
    const resp = await fetch(`${API}/review`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({pr_url: url}),
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || resp.statusText);
    }
    const data = await resp.json();
    renderResults(data);
  } catch (e) {
    document.getElementById('error-box').classList.remove('hidden');
    document.getElementById('error-text').textContent = `Error: ${e.message}`;
  } finally {
    document.getElementById('run-btn').disabled = false;
    document.getElementById('status').classList.add('hidden');
  }
}

function renderResults(d) {
  // Header
  document.getElementById('pr-title').textContent = d.pr_title;
  document.getElementById('pr-meta').textContent =
    `Strategy: ${d.best_strategy} · Candidates: ${d.candidates.length}`;

  const badge = document.getElementById('branched-badge');
  d.triggered_branch ? badge.classList.remove('hidden') : badge.classList.add('hidden');

  // Score
  const s = d.best_score;
  const color = scoreColor(s);
  document.getElementById('score-num').textContent = s.toFixed(1);
  document.getElementById('score-num').style.color = color;
  document.getElementById('score-fill').style.width = `${(s / 10) * 100}%`;
  document.getElementById('score-fill').style.background = color;
  document.getElementById('score-label').textContent = scoreLabel(s);
  document.getElementById('selector-rationale').textContent =
    d.selector_rationale ? `Selector: ${d.selector_rationale}` : '';

  // Best review
  document.getElementById('best-review').textContent = d.best_review;

  // Candidates (only show if > 1)
  const candSection = document.getElementById('candidates-section');
  const candGrid = document.getElementById('candidates-grid');
  if (d.candidates.length > 1) {
    candSection.classList.remove('hidden');
    candGrid.innerHTML = d.candidates.map((c, i) => {
      const isBest = c.strategy === d.best_strategy;
      const col = scoreColor(c.score);
      return `<div class="cand-card ${isBest ? 'best' : ''}">
        <div class="cand-title">
          ${isBest ? '★ ' : ''}${c.strategy}
          <span style="float:right;color:${col};font-weight:700">${c.score.toFixed(1)}</span>
        </div>
        <div style="font-size:12px;color:#8b949e;margin-bottom:8px">${c.score_rationale}</div>
        <div class="review-text" style="max-height:160px;font-size:12px">${c.review}</div>
      </div>`;
    }).join('');
  } else {
    candSection.classList.add('hidden');
  }

  // Trace
  const traceEl = document.getElementById('trace-container');
  traceEl.innerHTML = d.trace.map(ev => {
    const isError = ev.event === 'error';
    const ms = ev.duration_ms ? ` <span style="color:#484f58">${ev.duration_ms.toFixed(0)}ms</span>` : '';
    const dataStr = ev.data ? Object.entries(ev.data)
      .map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(' ') : '';
    return `<div class="trace-item">
      <span class="trace-agent">${ev.agent}</span>
      <span> › </span>
      <span class="trace-event ${isError ? 'error' : ''}">${ev.event}</span>
      ${ms}
      <span style="color:#484f58"> ${dataStr.substring(0, 120)}</span>
    </div>`;
  }).join('');

  document.getElementById('results').classList.remove('hidden');
}

// Allow Enter key to submit
document.getElementById('pr-url').addEventListener('keydown', e => {
  if (e.key === 'Enter') runReview();
});
</script>
</body>
</html>
